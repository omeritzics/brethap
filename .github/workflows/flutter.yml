name: Flutter Tests

on:
  push:
    branches: [master, fdroid]
  pull_request:
    branches: [master, fdroid]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      # See https://github.com/subosito/flutter-action
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.1"
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
